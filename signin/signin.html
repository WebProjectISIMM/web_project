<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQueue - Connexion</title>
    <link rel="stylesheet" href="signin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <div style="position: absolute; top: 20px; right: 20px;">
                <i class="fas fa-moon theme-toggle-icon" style="cursor:pointer; font-size: 24px; color: #B2A14E;" onclick="toggleTheme()"></i>
            </div>
            <div class="logo-icon">
                <i class="fas fa-layer-group"></i>
            </div>
            <h1>SmartQueue</h1>
        </div>

        <div id="login-form">
            <div class="role-tabs">
                <button type="button" class="role-tab active" id="tab-client" onclick="setRole('client')">Client</button>
                <button type="button" class="role-tab" id="tab-agent" onclick="setRole('agent')">Agent / Admin</button>
            </div>

            <h2 id="login-title">Bienvenue sur SmartQueue</h2>
            <p class="subtitle" id="login-subtitle">Entrez vos identifiants pour continuer</p>

            <form onsubmit="handleLogin(event)">
                <input type="hidden" id="user-role" value="client">
                
                <div class="input-group">
                    <label id="email-label">Email</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" placeholder="Adresse Email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Mot de passe</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Entrez le mot de passe" id="pass-login" required>
                        <i class="far fa-eye-slash toggle-password" onclick="togglePass('pass-login')"></i>
                    </div>
                </div><br>
                <button type="submit" class="btn-primary">Se Connecter</button>
            </form>
            <p class="footer-text">Pas encore de compte ? <a href="../signup/signup.html">S'inscrire</a></p>
        </div>
    </div>
<style>
    .role-tabs {
        display: flex;
        background: var(--glass-bg);
        padding: 6px;
        border-radius: 40px;
        margin-bottom: 30px;
        border: 1px solid var(--border-color);
    }
    .role-tab {
        flex: 1;
        padding: 12px;
        border: none;
        background: none;
        color: var(--text-muted);
        font-weight: 600;
        cursor: pointer;
        border-radius: 30px;
        transition: all 0.3s ease;
    }
    .role-tab.active {
        background: var(--primary-color);
        color: #1A1A1A;
        box-shadow: 0 4px 10px rgba(178, 161, 78, 0.2);
    }
</style>
<script>
    function setRole(role) {
        document.getElementById('user-role').value = role;
        const title = document.getElementById('login-title');
        const subtitle = document.getElementById('login-subtitle');
        const emailLabel = document.getElementById('email-label');
        
        document.getElementById('tab-client').classList.toggle('active', role === 'client');
        document.getElementById('tab-agent').classList.toggle('active', role === 'agent');
        
        if (role === 'agent') {
            title.innerText = "Connexion Agent";
            subtitle.innerText = "Accédez à votre espace guichet";
            emailLabel.innerText = "Email professionnel";
        } else {
            title.innerText = "Bienvenue sur SmartQueue";
            subtitle.innerText = "Entrez vos identifiants pour continuer";
            emailLabel.innerText = "Email";
        }
    }
</script>

<script src="signin.js"></script>
<script src="../theme.js"></script>
</body>
</html>
