<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQueue - Connexion</title>
    <link rel="stylesheet" href="signin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <div style="position: absolute; top: 20px; right: 20px;">
                <i class="fas fa-moon theme-toggle-icon" style="cursor:pointer; font-size: 24px; color: #B2A14E;" onclick="toggleTheme()"></i>
            </div>
            <div class="logo-icon">
                <i class="fas fa-layer-group"></i>
            </div>
            <h1>SmartQueue</h1>
        </div>

        <div id="login-form">
            <h2 id="login-title">Bienvenue sur SmartQueue</h2>
            <p class="subtitle" id="login-subtitle">Entrez vos identifiants pour continuer</p>

            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label id="email-label">Email</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" name="email" placeholder="Adresse Email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Mot de passe</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" name="password" placeholder="Entrez le mot de passe" id="pass-login" required>
                        <i class="far fa-eye-slash toggle-password" onclick="togglePass('pass-login')"></i>
                    </div>
                </div><br>
                <button type="submit" class="btn-primary">Se Connecter</button>
            </form>
            <p class="footer-text">Pas encore de compte ? <a href="../signup/signup.html">S'inscrire</a></p>
        </div>
    </div>
<style>
    /* Kept base styles */
</style>
<script>
    function togglePass(id) {
        const input = document.getElementById(id);
        const icon = input.nextElementSibling;
        if (input.type === "password") {
            input.type = "text";
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        } else {
            input.type = "password";
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        }
    }
</script>


<script src="signin.js"></script>
<script src="../theme.js"></script>
</body>
</html>
