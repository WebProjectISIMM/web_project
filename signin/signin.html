<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartQueue - Connexion</title>
    <link rel="stylesheet" href="signin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <div style="position: absolute; top: 20px; right: 20px;">
                <i class="fas fa-moon theme-toggle-icon" style="cursor:pointer; font-size: 24px; color: #B2A14E;" onclick="toggleTheme()"></i>
            </div>
            <div class="logo-icon">
                <i class="fas fa-layer-group"></i>
            </div>
            <h1>SmartQueue</h1>
        </div>

        <div id="login-form">
            <h2>Bienvenue sur SmartQueue</h2>
            <p class="subtitle">Entrez vos identifiants pour continuer</p>

            <form onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" placeholder="Adresse Email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Mot de passe</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Entrez le mot de passe" id="pass-login" required>
                        <i class="far fa-eye-slash toggle-password" onclick="togglePass('pass-login')"></i>
                    </div>
                </div><br>
                <button type="submit" class="btn-primary">Se Connecter</button>
            </form>
            <p class="footer-text">Pas encore de compte ? <a href="#" onclick="switchForm()">S'inscrire</a></p>
        </div>

        <div id="signup-form" style="display: none;">
            <h2>Créer un compte</h2>
            <p class="subtitle">Rejoignez la file d'attente intelligente</p>

            <form onsubmit="handleSignup(event)">
                <div class="input-group">
                    <label>Nom complet</label>
                    <div class="input-wrapper">
                        <i class="far fa-user"></i>
                        <input type="text" placeholder="Votre nom" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" placeholder="Adresse Email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Mot de passe</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" placeholder="Créer un mot de passe" id="pass-signup" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary">Créer mon compte</button>
            </form>
            <p class="footer-text">Déjà inscrit ? <a href="#" onclick="switchForm()">Se connecter</a></p>
        </div>
    </div>
<script src="signin.js"></script>
<script src="../theme.js"></script>
</body>
</html>
